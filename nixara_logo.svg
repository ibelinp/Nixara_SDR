<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="heavyGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Scan line pattern -->
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="4" height="4">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
    </pattern>

    <!-- Fine grid pattern -->
    <pattern id="finegrid" patternUnits="userSpaceOnUse" width="20" height="20">
      <rect width="20" height="20" fill="none"/>
      <line x1="0" y1="20" x2="20" y2="20" stroke="#ffffff" stroke-width="0.2" opacity="0.04"/>
      <line x1="20" y1="0" x2="20" y2="20" stroke="#ffffff" stroke-width="0.2" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background - deep black -->
  <rect width="800" height="400" fill="#050507"/>
  
  <!-- Fine grid overlay -->
  <rect width="800" height="400" fill="url(#finegrid)"/>
  
  <!-- Scan lines -->
  <rect width="800" height="400" fill="url(#scanlines)"/>

  <!-- Subtle horizontal reference lines -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
  </g>

  <!-- Corner brackets - tactical HUD -->
  <g stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.25">
    <!-- Top left -->
    <polyline points="24,52 24,24 52,24"/>
    <!-- Top right -->
    <polyline points="748,24 776,24 776,52"/>
    <!-- Bottom left -->
    <polyline points="24,348 24,376 52,376"/>
    <!-- Bottom right -->
    <polyline points="748,376 776,376 776,348"/>
  </g>

  <!-- Inner corner ticks -->
  <g stroke="#ffffff" stroke-width="0.8" fill="none" opacity="0.12">
    <polyline points="38,62 38,38 62,38"/>
    <polyline points="738,38 762,38 762,62"/>
    <polyline points="38,338 38,362 62,362"/>
    <polyline points="738,362 762,362 762,338"/>
  </g>

  <!-- SPECTRUM / WAVEFORM ICON -->
  <!-- Centered above the wordmark -->
  <g transform="translate(400, 130)" filter="url(#softGlow)">
    <!-- Spectrum analyzer bars - abstract waveform showing a signal landscape -->
    <!-- This represents a spectral view: noise floor with signal peaks -->
    
    <!-- Noise floor baseline - subtle -->
    <line x1="-120" y1="0" x2="120" y2="0" stroke="#ffffff" stroke-width="0.4" opacity="0.15"/>
    
    <!-- Spectrum bars - varying heights like a real spectrum display -->
    <g fill="#ffffff" opacity="0.9">
      <!-- Left noise floor region -->
      <rect x="-110" y="-4" width="3" height="4" rx="0.5" opacity="0.2"/>
      <rect x="-104" y="-6" width="3" height="6" rx="0.5" opacity="0.25"/>
      <rect x="-98" y="-3" width="3" height="3" rx="0.5" opacity="0.15"/>
      <rect x="-92" y="-5" width="3" height="5" rx="0.5" opacity="0.2"/>
      <rect x="-86" y="-7" width="3" height="7" rx="0.5" opacity="0.25"/>
      <rect x="-80" y="-4" width="3" height="4" rx="0.5" opacity="0.2"/>
      
      <!-- Rising signal 1 -->
      <rect x="-74" y="-10" width="3" height="10" rx="0.5" opacity="0.35"/>
      <rect x="-68" y="-18" width="3" height="18" rx="0.5" opacity="0.5"/>
      <rect x="-62" y="-30" width="3" height="30" rx="0.5" opacity="0.65"/>
      <rect x="-56" y="-45" width="3" height="45" rx="0.5" opacity="0.85"/>
      <rect x="-50" y="-55" width="3" height="55" rx="0.5" opacity="0.95"/>
      <rect x="-44" y="-42" width="3" height="42" rx="0.5" opacity="0.8"/>
      <rect x="-38" y="-25" width="3" height="25" rx="0.5" opacity="0.55"/>
      <rect x="-32" y="-12" width="3" height="12" rx="0.5" opacity="0.35"/>
      
      <!-- Valley -->
      <rect x="-26" y="-5" width="3" height="5" rx="0.5" opacity="0.2"/>
      <rect x="-20" y="-4" width="3" height="4" rx="0.5" opacity="0.18"/>
      <rect x="-14" y="-6" width="3" height="6" rx="0.5" opacity="0.22"/>
      
      <!-- Central dominant peak -->
      <rect x="-8" y="-14" width="3" height="14" rx="0.5" opacity="0.4"/>
      <rect x="-2" y="-32" width="3" height="32" rx="0.5" opacity="0.6"/>
      <rect x="4" y="-58" width="3" height="58" rx="0.5" opacity="0.85"/>
      <rect x="10" y="-72" width="4" height="72" rx="0.5"/>
      <rect x="17" y="-68" width="3" height="68" rx="0.5" opacity="0.9"/>
      <rect x="23" y="-44" width="3" height="44" rx="0.5" opacity="0.7"/>
      <rect x="29" y="-22" width="3" height="22" rx="0.5" opacity="0.5"/>
      <rect x="35" y="-10" width="3" height="10" rx="0.5" opacity="0.3"/>
      
      <!-- More noise / small signals -->
      <rect x="41" y="-5" width="3" height="5" rx="0.5" opacity="0.2"/>
      <rect x="47" y="-8" width="3" height="8" rx="0.5" opacity="0.25"/>
      <rect x="53" y="-15" width="3" height="15" rx="0.5" opacity="0.4"/>
      <rect x="59" y="-28" width="3" height="28" rx="0.5" opacity="0.6"/>
      <rect x="65" y="-22" width="3" height="22" rx="0.5" opacity="0.5"/>
      <rect x="71" y="-11" width="3" height="11" rx="0.5" opacity="0.3"/>
      <rect x="77" y="-6" width="3" height="6" rx="0.5" opacity="0.22"/>
      
      <!-- Right noise floor -->
      <rect x="83" y="-4" width="3" height="4" rx="0.5" opacity="0.18"/>
      <rect x="89" y="-5" width="3" height="5" rx="0.5" opacity="0.2"/>
      <rect x="95" y="-3" width="3" height="3" rx="0.5" opacity="0.15"/>
      <rect x="101" y="-6" width="3" height="6" rx="0.5" opacity="0.22"/>
      <rect x="107" y="-4" width="3" height="4" rx="0.5" opacity="0.18"/>
    </g>

    <!-- Thin marker lines on peak signals -->
    <line x1="11" y1="-72" x2="11" y2="-80" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
    <line x1="-49" y1="-55" x2="-49" y2="-62" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
  </g>

  <!-- Thin horizontal rule under spectrum -->
  <line x1="260" y1="148" x2="540" y2="148" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>

  <!-- NIXARA wordmark -->
  <g filter="url(#glow)">
    <text x="400" y="218" 
          font-family="'Courier New', 'SF Mono', 'Consolas', monospace" 
          font-size="82" 
          font-weight="bold" 
          letter-spacing="22" 
          fill="#ffffff" 
          text-anchor="middle"
          opacity="0.95">NIXARA</text>
  </g>

  <!-- Accent line under wordmark -->
  <line x1="280" y1="238" x2="520" y2="238" stroke="#ffffff" stroke-width="0.8" opacity="0.2"/>
  
  <!-- Small center diamond -->
  <polygon points="400,244 404,250 400,256 396,250" fill="none" stroke="#ffffff" stroke-width="0.6" opacity="0.2"/>

  <!-- Tagline -->
  <text x="400" y="278" 
        font-family="'Courier New', 'SF Mono', 'Consolas', monospace" 
        font-size="11.5" 
        letter-spacing="7" 
        fill="#ffffff" 
        text-anchor="middle"
        opacity="0.35">SOFTWARE DEFINED RADIO</text>

  <!-- HUD data elements -->
  <g font-family="'Courier New', 'Consolas', monospace" font-size="8.5" fill="#ffffff" opacity="0.13">
    <!-- Top left -->
    <text x="34" y="18">NIX://SIGINT</text>
    <!-- Top right -->
    <text x="690" y="18" text-anchor="start">200MHz BW</text>
    <!-- Bottom left -->
    <text x="34" y="390">SYS::ACTIVE</text>
    <!-- Bottom right -->
    <text x="690" y="390" text-anchor="start">16BIT//500MS</text>
  </g>

  <!-- Subtle hash marks on corners - tick marks -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.08">
    <!-- Top center ticks -->
    <line x1="396" y1="24" x2="396" y2="32"/>
    <line x1="400" y1="24" x2="400" y2="34"/>
    <line x1="404" y1="24" x2="404" y2="32"/>
    <!-- Bottom center ticks -->
    <line x1="396" y1="368" x2="396" y2="376"/>
    <line x1="400" y1="366" x2="400" y2="376"/>
    <line x1="404" y1="368" x2="404" y2="376"/>
  </g>
</svg>
